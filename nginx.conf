# ==============================================================================
# usepager Nginx Configuration
# ==============================================================================
#
# Este arquivo cobre dois cenarios:
#
#   1. App principal (app.seudominio.com) -> proxy para o container Next.js
#   2. Sites publicados (*.seudominio.com) -> serve estaticos direto do volume
#
# Como usar:
#
#   1. Copie para /etc/nginx/sites-available/usepager.conf
#   2. Substitua TODAS as ocorrencias de "seudominio.com" pelo seu dominio real
#   3. Ajuste os caminhos de volume se necessario
#   4. Symlink: ln -s /etc/nginx/sites-available/usepager.conf /etc/nginx/sites-enabled/
#   5. Teste: nginx -t
#   6. Reload: systemctl reload nginx
#   7. Configure SSL com: certbot --nginx -d app.seudominio.com -d *.seudominio.com
#
# Requisitos:
#
#   - Wildcard DNS: *.seudominio.com -> IP da VPS
#   - DNS A record: app.seudominio.com -> IP da VPS
#   - Certbot com plugin DNS para wildcard SSL (ex: certbot-dns-cloudflare)
#   - Volume do container montado em um path acessivel pelo Nginx
#
# ==============================================================================

# ---------- Upstream: container Next.js ----------
upstream usepager_app {
    server 127.0.0.1:3000;
    keepalive 16;
}

# ---------- 1. App principal ----------
server {
    listen 80;
    server_name app.seudominio.com;

    # Certbot vai adicionar o bloco SSL automaticamente.
    # Para forcar HTTPS manualmente, descomente:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://usepager_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Timeout generoso para uploads e SSR
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 10m;
    }

    # Cache de assets estaticos do Next.js
    location /_next/static/ {
        proxy_pass http://usepager_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ---------- 2. Sites publicados por subdominio ----------
#
# Serve arquivos estaticos diretamente do volume de storage,
# sem passar pelo Next.js. Muito mais rapido para trafego publico.
#
# IMPORTANTE: ajuste o path "/data/usepager/storage/sites" para o
# caminho real onde o volume /app/storage esta montado no host.
#
server {
    listen 80;
    server_name ~^(?<site>[a-z0-9](?:[a-z0-9\-]{0,61}[a-z0-9])?)\.seudominio\.com$;

    # Rejeita subdominio "app" para nao conflitar com o bloco acima
    if ($site = "app") {
        return 444;
    }

    # Ajuste este path para o mount point real do volume no host
    root /data/usepager/storage/sites/$site;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Paginas HTML
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Assets copiados durante publicacao
    location /uploads/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Bloqueia dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }

    # Custom 404
    error_page 404 /404.html;
}
