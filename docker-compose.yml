services:
  postgres:
    image: postgres:16-alpine
    container_name: pro-pages-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pro_pages
      POSTGRES_USER: pro_pages
      POSTGRES_PASSWORD: pro_pages
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pro_pages -d pro_pages"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pro-pages-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
